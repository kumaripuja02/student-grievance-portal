<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Grievance Portal - Login</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <div class="container">
    <div class="logo">
      <h1>🎓 Grievance Portal</h1>
      <p>GEC Vaishali — Student Grievance Management System</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login', this)">Login</div>
      <div class="tab" onclick="switchTab('register', this)">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>
      <button onclick="login()">Login</button>
      <div id="loginMsg" class="message"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Enter your full name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Create a password" />
      </div>
      <div class="form-group">
        <label>Register As</label>
        <select id="regRole">
          <option value="student">Student</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button onclick="register()">Create Account</button>
      <div id="registerMsg" class="message"></div>
    </div>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
